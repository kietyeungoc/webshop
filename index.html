<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Bio của tao</title>

<style>
body {
  margin: 0;
  padding: 0;
  font-family: Arial;
  color: white;
  text-align: center;
  background: url("https://4kwallpapers.com/images/walls/thumbs_3t/19435.png") no-repeat center center fixed;
  background-size: cover;
}

/* overlay làm nền tối */
.overlay {
  background: rgba(0,0,0,0.6);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* box info */
.card {
  background: rgba(0,0,0,0.5);
  padding: 30px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
}

/* avatar */
.avatar {
  width: 120px;
  border-radius: 50%;
  border: 3px solid white;
}

/* icon */
.icon {
  width: 40px;
  margin: 10px;
  cursor: pointer;
  transition: 0.3s;
}
.icon:hover {
  transform: scale(1.2);
}

/* particle canvas */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="overlay">
  <div class="card">
    
    <!-- avatar -->
    <img class="avatar" src="https://i.imgur.com/2DhmtJ4.png">

    <h1>Duy</h1>
    <p>Web của tao đã lên mạng</p>

    <!-- trạng thái -->
    <p>💔 Trạng thái: Đang độc thân</p>

    <!-- icon facebook -->
    <a href="https://www.facebook.com/profile.php?id=61582623579599" target="_blank">
      <img class="icon" src="https://cdn-icons-png.flaticon.com/512/733/733547.png">
    </a>

  </div>
</div>

<!-- nhạc (nếu có link mp3 thì thay vào) -->
<audio autoplay loop>
  <source src="" type="audio/mpeg">
</audio>

<script>
// particle đơn giản
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<100;i++){
  particles.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*3,
    dx: Math.random()-0.5,
    dy: Math.random()-0.5
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="white";

  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();

    p.x+=p.dx;
    p.y+=p.dy;

    if(p.x<0||p.x>canvas.width) p.dx*=-1;
    if(p.y<0||p.y>canvas.height) p.dy*=-1;
  });

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
